name: Build iOS Job
on:
  workflow_call:
    inputs:
      build_number:
        required: true
        type: string
      version_name:
        required: true
        type: string

jobs:
  build-ios:
    name: 🍏 Build & Upload iOS (TestFlight)
    runs-on: macos-latest
    timeout-minutes: 40
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Apple Certificate
        uses: apple-actions/import-codesign-certs@v3
        with:
          p12-file-base64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          p12-password: ${{ secrets.P12_PASSWORD }}
          keychain-password: ${{ secrets.KEYCHAIN_PASSWORD }}
          create-keychain: true
          keychain: login

      - name: Install Apple WWDR Certificates
        run: |
          curl -sL https://www.apple.com/certificateauthority/AppleWWDRCAG3.cer -o AppleWWDRCAG3.cer
          curl -sL https://www.apple.com/certificateauthority/AppleWWDRCAG4.cer -o AppleWWDRCAG4.cer
          security import AppleWWDRCAG3.cer -k ~/Library/Keychains/login.keychain-db -A
          security import AppleWWDRCAG4.cer -k ~/Library/Keychains/login.keychain-db -A

      - name: Install Provisioning Profile (Main App)
        run: |
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "${{ secrets.BUILD_PROVISION_PROFILE_BASE64 }}" | base64 --decode > /tmp/main.mobileprovision
          UUID=$(security cms -D -i /tmp/main.mobileprovision | plutil -extract UUID xml1 -o - - | sed -n 's/.*<string>\(.*\)<\/string>.*/\1/p')
          cp /tmp/main.mobileprovision ~/Library/MobileDevice/Provisioning\ Profiles/${UUID}.mobileprovision


      - name: Setup Flutter environment
        uses: ./.github/actions/setup-flutter-env
        with:
          flutter-version: ${{ vars.FLUTTER_VERSION }}
          cache-cocoapods: 'true'

      - name: Download generated code
        uses: actions/download-artifact@v4
        with:
          name: generated-code
          path: lib/
        continue-on-error: true

      - name: Setup Environments
        uses: ./.github/actions/setup-env-files
        with:
          dev_env: ${{ secrets.DEV_ENV_FILE }}
          prod_env: ${{ secrets.ENV_FILE }}

      - name: Setup Xcode version
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: 'latest-stable'

      - name: Configure Xcode Project for Manual Signing
        env:
          DEVELOPMENT_TEAM: ${{ vars.IOS_TEAM_ID }}
          MAIN_PROFILE_SPECIFIER: ${{ vars.IOS_MAIN_PROFILE }}
          # Uncomment the line below if using Live Activities / App Extensions
          # LIVE_ACTIVITY_PROFILE_SPECIFIER: ${{ vars.IOS_LIVE_PROFILE }}
        run: |
          gem install xcodeproj --quiet
          ruby .github/scripts/configure_ios_signing.rb

      - name: Build iOS IPA (Dev)
        env:
          VERSION_NAME: ${{ inputs.version_name }}
        run: |
          cd ios
          agvtool new-marketing-version "$VERSION_NAME"
          agvtool new-version -all 1
          cd ..
          
          flutter build ipa --release \
            --dart-define-from-file=.env \
            --build-name="$VERSION_NAME" \
            --build-number=1 \
            --export-options-plist=ios/ExportOptions.plist
            
          mkdir -p build/ios/ipa/dev
          mv build/ios/ipa/*.ipa build/ios/ipa/dev/App_Dev.ipa

      - name: Upload Dev App to TestFlight
        uses: apple-actions/upload-testflight-build@v1
        with:
          app-path: 'build/ios/ipa/dev/App_Dev.ipa'
          issuer-id: ${{ secrets.APPSTORE_ISSUER_ID }}
          api-key-id: ${{ secrets.APPSTORE_API_KEY_ID }}
          api-private-key: ${{ secrets.APPSTORE_API_PRIVATE_KEY }}

      - name: Upload iOS Dev IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-dev-ipa
          path: build/ios/ipa/dev/App_Dev.ipa
          retention-days: 3

      - name: Clean Build Folder
        run: |
          rm -rf build/ios/ipa/*.ipa build/ios/archive/*.xcarchive
          flutter clean
          flutter pub get

      - name: Build iOS IPA (Prod)
        env:
          VERSION_NAME: ${{ inputs.version_name }}
        run: |
          cd ios
          agvtool new-marketing-version "$VERSION_NAME"
          agvtool new-version -all 2
          cd ..
          
          flutter build ipa --release \
            --dart-define-from-file=.prod.env \
            --build-name="$VERSION_NAME" \
            --build-number=2 \
            --export-options-plist=ios/ExportOptions.plist
          mv build/ios/ipa/*.ipa build/ios/ipa/App.ipa

      - name: Upload Prod App to TestFlight
        uses: apple-actions/upload-testflight-build@v1
        with:
          app-path: 'build/ios/ipa/App.ipa'
          issuer-id: ${{ secrets.APPSTORE_ISSUER_ID }}
          api-key-id: ${{ secrets.APPSTORE_API_KEY_ID }}
          api-private-key: ${{ secrets.APPSTORE_API_PRIVATE_KEY }}

      - name: Upload iOS Prod IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-prod-ipa
          path: build/ios/ipa/App.ipa
          retention-days: 3

      - name: Report Failure & Cancel Run
        if: failure()
        uses: ./.github/actions/report-failure
        with:
          version_name: ${{ inputs.version_name }}
          build_number: ${{ inputs.build_number }}
          gh_token: ${{ secrets.GITHUB_TOKEN }}
